<!-- login.html -->

<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-box">

  <h1>Մուտք</h1>

  <form id="loginForm">

    <input 
      type="email"
      id="loginEmail"
      placeholder="Email"
      required
    >

    <input 
      type="password"
      id="loginPassword"
      placeholder="Գաղտնաբառ"
      required
    >

    <button type="submit">Մուտք գործել</button>

  </form>

  <p>
    Չունե՞ք հաշիվ 
    <a href="register.html">Գրանցվել</a>
  </p>

</div>

<script src="js/app.js"></script>

</body>
</html>
