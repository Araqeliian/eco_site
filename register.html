<!-- register.html -->

<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-box">

  <h1>Գրանցում</h1>

  <form id="registerForm">

    <input 
      type="text" 
      id="name"
      placeholder="Անուն"
    >

    <input 
      type="email"
      id="email"
      placeholder="Email"
    >

    <input 
      type="password"
      id="password"
      placeholder="Գաղտնաբառ"
    >

    <button type="submit">
      Գրանցվել
    </button>

  </form>

  <p>
    Արդեն ունե՞ք հաշիվ 
    <a href="login.html">Մուտք</a>
  </p>

</div>

<script src="js/app.js"></script>

</body>
</html>
